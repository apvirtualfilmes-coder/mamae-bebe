{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 text-center">
        <div class="card-leag mt-5">
            <div class="card-body p-5">
                <h1 class="display-4 texto-primario mb-4">
                    <i class="bi bi-heart-fill"></i> Leag Baby
                </h1>
                <p class="lead mb-4">
                    Acompanhe o desenvolvimento do seu bebê com ciência e amor.
                </p>
                <div class="d-grid gap-3 col-8 mx-auto">
                    <a href="{{ url_for('login') }}" class="btn btn-primario btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i> Entrar
                    </a>
                    <a href="{{ url_for('cadastrar') }}" class="btn btn-outline-secondary btn-lg">
                        <i class="bi bi-person-plus"></i> Criar Conta
                    </a>
                </div>
                <p class="mt-4 text-muted small">
                    <i class="bi bi-check-circle"></i> Grátis | Baseado em evidências científicas
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
