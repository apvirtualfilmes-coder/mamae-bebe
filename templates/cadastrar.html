{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg">
            <div class="card-body p-4">
                <h3 class="text-center text-pink mb-4">
                    <i class="bi bi-person-plus"></i> Cadastrar
                </h3>
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nome" class="form-label">Seu Nome</label>
                            <input type="text" class="form-control" id="nome" name="nome" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha" required minlength="6">
                    </div>
                    <hr class="my-4">
                    <h5 class="text-pink"><i class="bi bi-baby"></i> Dados do Bebê</h5>
                    <div class="mb-3">
                        <label for="nome_bebe" class="form-label">Nome do Bebê</label>
                        <input type="text" class="form-control" id="nome_bebe" name="nome_bebe">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="data_nasc" class="form-label">Data de Nascimento</label>
                            <input type="date" class="form-control" id="data_nasc" name="data_nasc">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="hora_nasc" class="form-label">Hora de Nascimento</label>
                            <input type="time" class="form-control" id="hora_nasc" name="hora_nasc">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="peso" class="form-label">Peso (kg)</label>
                        <input type="number" step="0.1" class="form-control" id="peso" name="peso" placeholder="Ex: 3.2">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-pink btn-lg">
                            <i class="bi bi-check-circle"></i> Cadastrar
                        </button>
                    </div>
                </form>
                <p class="text-center mt-3">
                    Já tem conta? <a href="{{ url_for('login') }}" class="text-pink">Faça login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
