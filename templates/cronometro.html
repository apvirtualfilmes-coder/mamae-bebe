{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg">
            <div class="card-body text-center p-5">
                <h3 class="text-pink mb-4">
                    <i class="bi bi-clock"></i> Cronômetro de Mamada
                </h3>
                
                <div class="tempo-grande mb-4" id="cronometro">
                    00:00
                </div>
                
                <div class="d-grid gap-3 col-6 mx-auto">
                    <button id="btnIniciar" class="btn btn-success btn-lg" onclick="iniciarCronometro()">
                        <i class="bi bi-play-fill"></i> Iniciar
                    </button>
                    <button id="btnParar" class="btn btn-danger btn-lg" onclick="pararCronometro()" style="display:none;">
                        <i class="bi bi-stop-fill"></i> Parar
                    </button>
                    <button id="btnRegistrar" class="btn btn-pink btn-lg" onclick="registrarMamada()" style="display:none;">
                        <i class="bi bi-check-circle"></i> Registrar Mamada
                    </button>
                </div>
                
                <p class="mt-4 text-muted small">
                    <i class="bi bi-info-circle"></i> Clique em Iniciar quando começar a mamada
                </p>
            </div>
        </div>
    </div>
</div>

<script>
let cronometroInterval = null;
let segundos = 0;
let minutos = 0;
let estaRodando = false;

function iniciarCronometro() {
    if (estaRodando) return;
    estaRodando = true;
    document.getElementById('btnIniciar').style.display = 'none';
    document.getElementById('btnParar').style.display = 'block';
    
    cronometroInterval = setInterval(function() {
        segundos++;
        if (segundos >= 60) {
            segundos = 0;
            minutos++;
        }
        document.getElementById('cronometro').textContent = 
            String(minutos).padStart(2, '0') + ':' + String(segundos).padStart(2, '0');
    }, 1000);
}

function pararCronometro() {
    estaRodando = false;
    clearInterval(cronometroInterval);
    document.getElementById('btnParar').style.display = 'none';
    document.getElementById('btnRegistrar').style.display = 'block';
}

function registrarMamada() {
    const tempo = document.getElementById('cronometro').textContent;
    
    fetch('/api/registrar_mamada', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            tempo: tempo,
            duracao: tempo
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('Mamada registrada com sucesso! Tempo: ' + tempo);
            segundos = 0;
            minutos = 0;
            document.getElementById('cronometro').textContent = '00:00';
            document.getElementById('btnRegistrar').style.display = 'none';
            document.getElementById('btnIniciar').style.display = 'block';
            window.location.href = '/dashboard';
        }
    });
}
</script>
{% endblock %}
