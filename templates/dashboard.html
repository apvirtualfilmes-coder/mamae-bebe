<!-- BOTÕES RÁPIDOS -->
<div class="row mt-4">
    <div class="col-12">
        <div class="card-leag">
            <div class="card-body">
                <h5 class="texto-primario"><i class="bi bi-plus-circle"></i> Registrar Atividade</h5>
                <div class="row g-2">
                    <div class="col-6 col-md-2">
                        <button type="button" class="btn btn-warning w-100" data-bs-toggle="modal" data-bs-target="#modalCoco">
                            <i class="bi bi-emoji-smile"></i><br>Cocô
                        </button>
                    </div>
                    <div class="col-6 col-md-2">
                        <form method="POST" action="{{ url_for('registrar') }}">
                            <input type="hidden" name="tipo" value="Xixi">
                            <button type="submit" class="btn btn-success w-100">
                                <i class="bi bi-droplet"></i><br>Xixi
                            </button>
                        </form>
                    </div>
                    <div class="col-6 col-md-2">
                        <form method="POST" action="{{ url_for('registrar') }}">
                            <input type="hidden" name="tipo" value="Regurgito">
                            <button type="submit" class="btn btn-danger w-100">
                                <i class="bi bi-arrow-up"></i><br>Regurgito
                            </button>
                        </form>
                    </div>
                    <div class="col-6 col-md-2">
                        <button type="button" class="btn btn-info w-100" data-bs-toggle="modal" data-bs-target="#modalSono">
                            <i class="bi bi-moon"></i><br>Dormiu
                        </button>
                    </div>
                    <div class="col-6 col-md-2">
                        <a href="{{ url_for('relatorio') }}" class="btn btn-primario w-100">
                            <i class="bi bi-file-text"></i><br>Relatório
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL SONO -->
<div class="modal fade" id="modalSono" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="background: var(--cor-fundo-card); color: var(--cor-texto);">
            <div class="modal-header">
                <h5 class="modal-title">Registrar Sono</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="{{ url_for('registrar') }}">
                <div class="modal-body">
                    <input type="hidden" name="tipo" value="Dormiu">
                    <div class="mb-3">
                        <label class="form-label">Hora que dormiu</label>
                        <input type="time" class="form-control form-control-leag" name="inicio_sono" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Hora que acordou</label>
                        <input type="time" class="form-control form-control-leag" name="fim_sono" required>
                    </div>
                    <div class="alert alert-info" style="background: var(--cor-fundo-card); color: var(--cor-texto); border-color: var(--cor-primaria);">
                        <i class="bi bi-info-circle"></i> O app vai calcular automaticamente a duração do sono.
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primario">Registrar Sono</button>
                </div>
            </form>
        </div>
    </div>
</div>
