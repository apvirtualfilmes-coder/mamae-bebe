services:
  - type: web
    name: mamae-bebe-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mamae-bebe-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: mamae-bebe-db
    databaseName: mamae_bebe
    user: mamae_bebe_user
    plan: free