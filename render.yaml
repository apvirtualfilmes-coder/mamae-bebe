services:
  - type: web
    name: leag-baby
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: leag-baby-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: leag-baby-db
    databaseName: leag_baby
    user: leag_baby_user
    plan: free